<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expanded Number Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #eaf7ff, #fff4d6);
      }
      .practice-card {
        max-width: 760px;
        border-radius: 24px;
      }
      .result-box {
        border-radius: 18px;
        min-height: 140px;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card practice-card shadow-lg border-0 mx-auto">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Expanded Number Form</h1>
          <p class="mb-4">
            Type a number and see how it breaks apart into place values.
          </p>

          <div class="row g-3 justify-content-center mb-4">
            <div class="col-12 col-sm-7">
              <label class="form-label fw-semibold">Enter a number</label>
              <input
                id="numberInput"
                type="number"
                min="0"
                step="1"
                class="form-control form-control-lg text-center"
                value=""
                placeholder="Pick a number"
                aria-label="Number to expand"
              />
            </div>
            <div class="col-12 col-sm-5 d-grid gap-2">
              <button
                class="btn btn-outline-secondary btn-lg"
                onclick="setRandomNumber()"
              >
                Random Number
              </button>
            </div>
          </div>

          <div id="result" class="result-box bg-light p-4 text-start"></div>

          <div class="mt-4">
            <a class="btn btn-link btn-lg" href="index.html">Back Home</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function numberToWords(value) {
        const ones = {
          0: "zero",
          1: "one",
          2: "two",
          3: "three",
          4: "four",
          5: "five",
          6: "six",
          7: "seven",
          8: "eight",
          9: "nine",
        };
        const teens = {
          10: "ten",
          11: "eleven",
          12: "twelve",
          13: "thirteen",
          14: "fourteen",
          15: "fifteen",
          16: "sixteen",
          17: "seventeen",
          18: "eighteen",
          19: "nineteen",
        };
        const tens = {
          2: "twenty",
          3: "thirty",
          4: "forty",
          5: "fifty",
          6: "sixty",
          7: "seventy",
          8: "eighty",
          9: "ninety",
        };
        const scales = ["", "thousand", "million"];

        function convertChunk(chunk, scale) {
          const parts = [];
          const hundreds = Math.floor(chunk / 100);
          const remainder = chunk % 100;

          if (hundreds > 0) {
            parts.push(`${ones[hundreds]} hundred`);
          }

          if (remainder >= 20) {
            const tensDigit = Math.floor(remainder / 10);
            const onesDigit = remainder % 10;
            parts.push(tens[tensDigit]);
            if (onesDigit > 0) {
              parts.push(ones[onesDigit]);
            }
          } else if (remainder >= 10) {
            parts.push(teens[remainder]);
          } else if (remainder > 0) {
            parts.push(ones[remainder]);
          }

          if (scale) {
            parts.push(scale);
          }

          return parts.join(" ");
        }

        if (value === 0) {
          return "zero";
        }

        const chunks = [];
        let remaining = value;
        let scaleIndex = 0;

        while (remaining > 0) {
          const chunk = remaining % 1000;
          if (chunk > 0) {
            chunks.unshift(convertChunk(chunk, scales[scaleIndex]));
          }
          remaining = Math.floor(remaining / 1000);
          scaleIndex += 1;
        }

        return chunks.join(" ");
      }

      function setRandomNumber() {
        const randomNumber = Math.floor(Math.random() * 1000) + 1;
        document.getElementById("numberInput").value = randomNumber;
        showExpandedForm();
      }

      function showExpandedForm() {
        const input = document.getElementById("numberInput").value.trim();
        const result = document.getElementById("result");

        if (!/^\d+$/.test(input)) {
          result.innerHTML =
            '<div class="alert alert-warning mb-0">Please enter a whole number.</div>';
          return;
        }

        const number = parseInt(input, 10);
        if (number < 0) {
          result.innerHTML =
            '<div class="alert alert-warning mb-0">Please use a positive number.</div>';
          return;
        }

        const digits = input.split("");
        const parts = [];
        const placeValueParts = [];

        const wordMap = {
          0: "zero",
          1: "one",
          2: "two",
          3: "three",
          4: "four",
          5: "five",
          6: "six",
          7: "seven",
          8: "eight",
          9: "nine",
        };

        const placeNameMap = {
          0: "ones",
          1: "tens",
          2: "hundreds",
          3: "thousands",
          4: "ten-thousands",
          5: "hundred-thousands",
        };

        digits.forEach((digit, index) => {
          const place = digits.length - index - 1;
          const digitValue = Number(digit);
          if (digitValue !== 0) {
            const placeValue = digitValue * 10 ** place;
            parts.push(placeValue.toLocaleString());
            const placeName = placeNameMap[place] || `${place}-place`;
            placeValueParts.push(`${wordMap[digitValue]} ${placeName}`);
          }
        });

        const expanded = parts.length > 0 ? parts.join(" + ") : "0";
        const placeForm =
          placeValueParts.length > 0 ? placeValueParts.join(", ") : "0";
        const words = numberToWords(number);

        result.innerHTML = `
          <div class="alert alert-success mb-0">
            <p class="mb-1"><strong>Expanded form:</strong> ${expanded}</p>
            <p class="mb-1"><strong>Written as words:</strong> ${words}</p>
            <p class="mb-0"><strong>Written as place value parts:</strong> ${placeForm}</p>
          </div>
        `;
      }

      setRandomNumber();
    </script>
  </body>
</html>
