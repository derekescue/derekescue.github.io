<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Practice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #fff7eb, #e6f9ff);
      }
      .app-card {
        max-width: 620px;
        border-radius: 24px;
      }
      .count-display {
        min-height: 180px;
      }
      .dot {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 50px;
        height: 50px;
        margin: 0.35rem;
        border-radius: 50%;
        background: #5c7cfa;
        color: white;
        font-size: 1.7rem;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
      }
      #answerButtons button {
        min-width: 3.5rem;
        min-height: 3.5rem;
        font-size: 1.2rem;
        border-radius: 18px;
      }
      .result-ok {
        color: #0f5132;
      }
      .result-bad {
        color: #842029;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card shadow-lg app-card mx-auto border-0">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Number Practice</h1>
          <p class="mb-3">Count the objects and tap the correct number.</p>

          <div class="card border-0 shadow-sm p-4 mb-4 bg-white count-display">
            <p class="text-muted mb-2">How many circles do you see?</p>
            <div id="circleArea" class="d-flex flex-wrap justify-content-center align-items-center"></div>
          </div>

          <div id="answerButtons" class="d-grid gap-2 row row-cols-5 g-2 mb-3"></div>

          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-outline-primary btn-lg" onclick="nextNumber()">
              New Question
            </button>
            <button class="btn btn-outline-secondary btn-lg" onclick="revealNumber()">
              Show Number
            </button>
          </div>

          <p id="result" class="fs-5 mb-3"></p>
          <a class="btn btn-link" href="index.html">Back Home</a>
        </div>
      </div>
    </div>

    <script>
      let currentNumber = 1;

      function setButtons() {
        const buttons = document.getElementById("answerButtons");
        buttons.innerHTML = "";
        for (let i = 1; i <= 10; i += 1) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "btn btn-light border btn-lg";
          button.innerText = i;
          button.onclick = () => checkNumber(i);
          buttons.appendChild(button);
        }
      }

      function showNumberDots(value) {
        const area = document.getElementById("circleArea");
        area.innerHTML = "";
        for (let i = 0; i < value; i += 1) {
          const dot = document.createElement("div");
          dot.className = "dot";
          dot.innerText = "";
          area.appendChild(dot);
        }
      }

      function randomNumber() {
        currentNumber = Math.floor(Math.random() * 10) + 1;
        showNumberDots(currentNumber);
        document.getElementById("result").innerText = "";
      }

      function checkNumber(value) {
        const result = document.getElementById("result");
        if (value === currentNumber) {
          result.innerText = "Correct! Great counting!";
          result.className = "fs-5 result-ok";
        } else {
          result.innerText = "Try again!";
          result.className = "fs-5 result-bad";
        }
      }

      function revealNumber() {
        const result = document.getElementById("result");
        result.innerText = `There are ${currentNumber} circles.`;
        result.className = "fs-5 text-muted";
      }

      function nextNumber() {
        randomNumber();
      }

      setButtons();
      randomNumber();
    </script>
  </body>
</html>
