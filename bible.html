<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bible Questions</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e6f7ff, #f4f1ff);
      }
      .app-card {
        max-width: 620px;
        border-radius: 24px;
      }
      #answer {
        font-size: 1.25rem;
        text-align: center;
      }
      .result-ok {
        color: #0f5132;
      }
      .result-bad {
        color: #842029;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card shadow-lg app-card mx-auto border-0">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Bible Questions</h1>
          <p class="mb-3">Answer the question and see if you know the story.</p>
          <div class="card border-0 shadow-sm bg-white p-4 mb-4">
            <p class="text-muted mb-1">Question</p>
            <p id="question" class="h4 fw-semibold mb-0"></p>
          </div>
          <div class="mb-4">
            <input
              id="answer"
              type="text"
              class="form-control form-control-lg mx-auto"
              style="max-width: 320px"
              placeholder="Type your answer"
              aria-label="Bible question answer"
            />
          </div>
          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success btn-lg" onclick="checkAnswer()">
              Check Answer
            </button>
            <button class="btn btn-outline-secondary btn-lg" onclick="revealAnswer()">
              Reveal Answer
            </button>
            <button class="btn btn-outline-primary btn-lg" onclick="nextQuestion()">
              New Question
            </button>
          </div>
          <p id="result" class="fs-5 mb-3"></p>
          <a class="btn btn-link" href="index.html">Back Home</a>
        </div>
      </div>
    </div>
    <script>
      const questions = [
        { question: "Who built the ark?", answer: "Noah" },
        { question: "What did David use to defeat Goliath?", answer: "Sling" },
        { question: "What did Jesus turn water into?", answer: "Wine" },
        { question: "Who was swallowed by a big fish?", answer: "Jonah" },
        { question: "What did God create on the first day?", answer: "Light" },
        { question: "Who was Jesus' mother?", answer: "Mary" },
        { question: "How many days did it rain during the flood?", answer: "Forty" },
        { question: "What is the first book of the Bible?", answer: "Genesis" },
        { question: "Who led the Israelites out of Egypt?", answer: "Moses" },
        { question: "What gift did the wise men bring?", answer: "Gold" }
      ];

      let current = null;

      function randomQuestion() {
        return questions[Math.floor(Math.random() * questions.length)];
      }

      function setQuestion() {
        current = randomQuestion();
        document.getElementById("question").innerText = current.question;
        document.getElementById("answer").value = "";
        document.getElementById("result").innerText = "";
      }

      function checkAnswer() {
        const answerText = document.getElementById("answer").value.trim();
        if (answerText === "") {
          showResult("Type your answer first!", false);
          return;
        }
        if (answerText.toLowerCase() === current.answer.toLowerCase()) {
          showResult("Correct! Great job!", true);
        } else {
          showResult("Try again!", false);
        }
      }

      function revealAnswer() {
        document.getElementById("answer").value = current.answer;
        showResult(`The answer is ${current.answer}.`, true);
      }

      function nextQuestion() {
        setQuestion();
        document.getElementById("answer").focus();
      }

      function showResult(message, good) {
        const result = document.getElementById("result");
        result.innerText = message;
        result.className = good ? "fs-5 result-ok" : "fs-5 result-bad";
      }

      setQuestion();
    </script>
  </body>
</html>
