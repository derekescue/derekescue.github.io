<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Counting</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #fff8e6, #e8fef8);
      }
      .count-card {
        max-width: 760px;
        border-radius: 24px;
      }
      .coin-box {
        min-width: 120px;
        min-height: 120px;
        border-radius: 24px;
        font-size: 1rem;
      }
      .money-icon {
        width: 70px;
        height: 70px;
      }
      .money-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .money-label {
        margin-top: 0.75rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card count-card shadow-lg border-0 mx-auto">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Money Counting</h1>
          <p class="mb-4">
            Count the coins and bills, then type the total amount.
          </p>

          <div
            id="moneyItems"
            class="d-flex flex-wrap justify-content-center gap-3 mb-4"
          ></div>

          <div class="mb-3">
            <label class="form-label fs-5">How much money is shown?</label>
            <input
              id="answer"
              type="text"
              class="form-control form-control-lg mx-auto"
              style="max-width: 260px; text-align: center"
              placeholder="e.g. 1.35"
              aria-label="Total money amount"
            />
          </div>

          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-primary btn-lg" onclick="checkAmount()">
              Check Total
            </button>
            <button
              class="btn btn-outline-secondary btn-lg"
              onclick="newProblem()"
            >
              New Set
            </button>
          </div>

          <div id="message" class="fs-5 mb-4"></div>

          <a class="btn btn-link btn-lg" href="index.html">Back Home</a>
        </div>
      </div>
    </div>

    <script>
      const options = [
        {
          label: "Penny",
          svg: '<img src="SVGs/penny.jfif" alt="Penny" />',
          value: 0.01,
        },
        {
          label: "Nickel",
          svg: '<img src="SVGs/nickel.jfif" alt="Nickel" />',
          value: 0.05,
        },
        {
          label: "Dime",
          svg: '<img src="SVGs/dime.jfif" alt="Dime" />',
          value: 0.1,
        },
        {
          label: "Quarter",
          svg: '<img src="SVGs/united-states-quarter-front.svg" alt="Quarter" />',
          value: 0.25,
        },
        {
          label: "Dollar bill",
          svg: '<img src="SVGs/dollar.jfif" alt="Dollar bill" />',
          value: 1.0,
        },
      ];

      let currentTotal = 0;

      function formatMoney(value) {
        return value.toFixed(2);
      }

      function newProblem() {
        const count = Math.floor(Math.random() * 4) + 3;
        const items = [];
        currentTotal = 0;

        for (let i = 0; i < count; i++) {
          const item = options[Math.floor(Math.random() * options.length)];
          items.push(item);
          currentTotal += item.value;
        }

        currentTotal = Math.round(currentTotal * 100) / 100;
        const container = document.getElementById("moneyItems");
        container.innerHTML = "";

        items.forEach((item) => {
          const box = document.createElement("div");
          box.className =
            "coin-box bg-white shadow-sm d-flex flex-column align-items-center justify-content-center p-3";
          box.innerHTML = `<div class="money-icon">${item.svg}</div><div class="money-label">${item.label}</div>`;
          container.appendChild(box);
        });

        document.getElementById("answer").value = "";
        document.getElementById("message").innerText = "";
      }

      function checkAmount() {
        const answer = document.getElementById("answer").value.trim();
        const message = document.getElementById("message");
        const parsed = parseFloat(answer);

        if (answer === "" || Number.isNaN(parsed)) {
          message.className = "text-danger fs-5 mb-4";
          message.innerText = "Please type a number like 1.35";
          return;
        }

        if (Math.abs(parsed - currentTotal) < 0.01) {
          message.className = "text-success fs-5 mb-4";
          message.innerText = `Correct! The total is $${formatMoney(
            currentTotal
          )}.`;
          setTimeout(() => {
            newProblem();
          }, 800);
        } else {
          message.className = "text-danger fs-5 mb-4";
          message.innerText = `Not quite yet. Try again!`;
        }
      }

      newProblem();
    </script>
  </body>
</html>
