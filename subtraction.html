<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtraction Practice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e7f9f0, #fff4d6);
      }
      .app-card {
        max-width: 540px;
        border-radius: 24px;
      }
      #answer {
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 0.06em;
      }
      .keypad button {
        min-width: 72px;
        min-height: 72px;
        font-size: 1.3rem;
        border-radius: 18px;
      }
      .result-ok {
        color: #0f5132;
      }
      .result-bad {
        color: #842029;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card shadow-lg app-card mx-auto border-0">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Subtraction Practice</h1>
          <p id="problem" class="display-6 fw-semibold mb-4"></p>

          <div class="mb-4">
            <input
              id="answer"
              type="text"
              inputmode="numeric"
              class="form-control form-control-lg mx-auto"
              style="max-width: 220px"
              aria-label="Answer input"
            />
          </div>

          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success btn-lg" onclick="check()">
              Check Answer
            </button>
            <button
              class="btn btn-outline-secondary btn-lg"
              onclick="revealAnswer()"
            >
              Reveal Answer
            </button>
            <button
              class="btn btn-outline-primary btn-lg"
              onclick="nextProblem()"
            >
              New Problem
            </button>
          </div>

          <p id="result" class="fs-5 mb-3"></p>

          <div
            class="keypad d-flex flex-wrap justify-content-center gap-2 mb-4"
          >
            <button class="btn btn-light" onclick="appendDigit('1')">1</button>
            <button class="btn btn-light" onclick="appendDigit('2')">2</button>
            <button class="btn btn-light" onclick="appendDigit('3')">3</button>
            <button class="btn btn-light" onclick="appendDigit('4')">4</button>
            <button class="btn btn-light" onclick="appendDigit('5')">5</button>
            <button class="btn btn-light" onclick="appendDigit('6')">6</button>
            <button class="btn btn-light" onclick="appendDigit('7')">7</button>
            <button class="btn btn-light" onclick="appendDigit('8')">8</button>
            <button class="btn btn-light" onclick="appendDigit('9')">9</button>
            <button
              class="btn btn-secondary text-white"
              onclick="clearAnswer()"
            >
              Clear
            </button>
            <button class="btn btn-light" onclick="appendDigit('0')">0</button>
            <button class="btn btn-danger text-white" onclick="backspace()">
              ⌫
            </button>
          </div>

          <a class="btn btn-link" href="index.html">Back Home</a>
        </div>
      </div>
    </div>

    <script>
      let a = 0;
      let b = 0;

      function setProblem() {
        a = Math.floor(Math.random() * 12) + 1;
        b = Math.floor(Math.random() * a) + 1;
        document.getElementById("problem").innerText = `${a} − ${b} = ?`;
        document.getElementById("answer").value = "";
        document.getElementById("result").innerText = "";
      }

      function check() {
        const answerText = document.getElementById("answer").value.trim();
        if (answerText === "") {
          showResult("Type your answer first!", false);
          return;
        }

        const user = parseInt(answerText, 10);
        if (!Number.isFinite(user)) {
          showResult("Please use numbers only.", false);
          return;
        }

        if (user === a - b) {
          showResult("Correct! Great job!", true);
        } else {
          showResult("Try again!", false);
        }
      }

      function showResult(message, good) {
        const result = document.getElementById("result");
        result.innerText = message;
        result.className = good ? "fs-5 result-ok" : "fs-5 result-bad";
      }

      function nextProblem() {
        setProblem();
        document.getElementById("answer").focus();
      }

      function appendDigit(digit) {
        const input = document.getElementById("answer");
        input.value = input.value + digit;
        input.focus();
      }

      function clearAnswer() {
        document.getElementById("answer").value = "";
        document.getElementById("answer").focus();
      }

      function revealAnswer() {
        const correct = a - b;
        document.getElementById("answer").value = correct;
        showResult(`The answer is ${correct}.`, true);
      }

      function backspace() {
        const input = document.getElementById("answer");
        input.value = input.value.slice(0, -1);
        input.focus();
      }

      setProblem();
    </script>
  </body>
</html>
