<!DOCTYPE html>
<html>
<head>
  <title>Number Family</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }

    h1 {
      color: #333;
    }

    .problem {
      font-size: 28px;
      margin: 10px;
    }

    input {
      padding: 10px;
      font-size: 20px;
      width: 120px;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Number Family Generator</h1>

<p>Enter a number:</p>

<input id="totalInput" type="number" value="12">

<br>

<button onclick="generateCustomFamily()">
  Generate Number Family
</button>

<button onclick="generateRandomFamily()">
  Random Number Family
</button>

<div id="problems" style="margin-top: 30px;"></div>

<br><br>

<a href="index.html">Back Home</a>

<script>

function showFamily(total) {

  let html = `<h2>Number Family for ${total}</h2>`;

  for(let i = total; i >= 0; i--) {

    let other = total - i;

    html += `
      <div class="problem">
        ${i} + ${other} = ${total}
      </div>
    `;
  }

  document.getElementById("problems").innerHTML = html;
}

function generateCustomFamily() {

  const total = parseInt(
    document.getElementById("totalInput").value
  );

  showFamily(total);
}

function generateRandomFamily() {

  const total =
    Math.floor(Math.random() * 16) + 5;

  document.getElementById("totalInput").value =
    total;

  showFamily(total);
}

generateRandomFamily();

</script>

</body>
</html>
