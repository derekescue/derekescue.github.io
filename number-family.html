<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Family</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e8f7ff, #fff9e6);
      }
      .family-card {
        max-width: 720px;
        border-radius: 22px;
      }
      .number-item {
        font-size: 1.4rem;
        padding: 0.9rem 1rem;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card family-card shadow-lg mx-auto border-0">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Number Family Generator</h1>
          <p class="mb-4">
            Make a number family with big friendly buttons for iPad learning.
          </p>

          <div class="row g-3 align-items-end justify-content-center mb-4">
            <div class="col-12 col-sm-5">
              <label class="form-label fw-semibold">Enter a number</label>
              <input
                id="totalInput"
                type="number"
                min="0"
                max="50"
                class="form-control form-control-lg text-center"
                value="12"
                aria-label="Number family total"
              />
            </div>
            <div class="col-12 col-sm-7 d-grid gap-2">
              <button
                class="btn btn-primary btn-lg"
                onclick="generateCustomFamily()"
              >
                Generate Number Family
              </button>
              <button
                class="btn btn-outline-secondary btn-lg"
                onclick="generateRandomFamily()"
              >
                Random Number Family
              </button>
            </div>
          </div>

          <div id="problems"></div>

          <div class="mt-4">
            <a class="btn btn-link" href="index.html">Back Home</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function showFamily(total) {
        if (!Number.isFinite(total) || total < 0) {
          document.getElementById("problems").innerHTML =
            '<div class="alert alert-warning">Please choose a positive number.</div>';
          return;
        }

        let html = `<h2 class="mb-3">Number Family for ${total}</h2>`;
        html += '<div class="list-group">';

        for (let i = total; i >= 0; i--) {
          const other = total - i;
          html += `<div class="list-group-item number-item rounded-3 mb-2">${i} + ${other} = ${total}</div>`;
        }

        html += "</div>";
        document.getElementById("problems").innerHTML = html;
      }

      function generateCustomFamily() {
        const total = parseInt(document.getElementById("totalInput").value, 10);
        showFamily(total);
      }

      function generateRandomFamily() {
        const total = Math.floor(Math.random() * 16) + 5;
        document.getElementById("totalInput").value = total;
        showFamily(total);
      }

      generateRandomFamily();
    </script>
  </body>
</html>
