<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Money Identifying</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e6f7ff, #fff4e5);
      }
      .money-card {
        max-width: 860px;
        border-radius: 24px;
      }
      .money-button {
        min-width: 160px;
        min-height: 180px;
        border-radius: 24px;
        font-size: 1.2rem;
      }
      .money-icon {
        width: 90px;
        height: 90px;
        margin: 0 auto;
      }
      .money-icon img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .money-value {
        margin-top: 1rem;
        font-weight: 700;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card money-card shadow-lg border-0 mx-auto">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Money Identifying</h1>
          <p class="mb-4">
            Tap the picture that matches the name of the coin or bill.
          </p>

          <div class="mb-4">
            <div id="prompt" class="fs-4 fw-semibold"></div>
          </div>

          <div
            class="d-flex flex-wrap justify-content-center gap-3 mb-4"
            id="choices"
          ></div>

          <div id="feedback" class="fs-5 mb-4"></div>

          <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
            <button class="btn btn-primary btn-lg" onclick="nextQuestion()">
              Next Money
            </button>
            <a class="btn btn-link btn-lg" href="index.html">Back Home</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const moneyItems = [
        {
          name: "Penny",
          svg: '<img src="SVGs/penny.jfif" alt="Penny" />',
          label: "1¢ penny",
          value: "1¢",
        },
        {
          name: "Nickel",
          svg: '<img src="SVGs/nickel.jfif" alt="Nickel" />',
          label: "5¢ nickel",
          value: "5¢",
        },
        {
          name: "Dime",
          svg: '<img src="SVGs/dime.jfif" alt="Dime" />',
          label: "10¢ dime",
          value: "10¢",
        },
        {
          name: "Quarter",
          svg: '<img src="SVGs/united-states-quarter-front.svg" alt="Quarter" />',
          label: "25¢ quarter",
          value: "25¢",
        },
        {
          name: "Dollar bill",
          svg: '<img src="SVGs/dollar.jfif" alt="$1 bill" />',
          label: "$1 bill",
          value: "$1",
        },
      ];

      let currentAnswer = null;

      function buildChoices() {
        const choices = document.getElementById("choices");
        choices.innerHTML = "";

        const shuffled = moneyItems.sort(() => 0.5 - Math.random()).slice(0, 4);
        currentAnswer = shuffled[Math.floor(Math.random() * shuffled.length)];

        document.getElementById(
          "prompt"
        ).innerText = `Tap the ${currentAnswer.name}`;
        document.getElementById("feedback").innerText = "";

        shuffled.forEach((item) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className =
            "btn btn-light shadow money-button d-flex flex-column align-items-center justify-content-center";
          button.setAttribute("aria-label", item.label);
          button.innerHTML = `<div class="money-icon">${item.svg}</div><div class="money-value">${item.value}</div>`;
          button.onclick = () => checkAnswer(item);
          choices.appendChild(button);
        });
      }

      function checkAnswer(item) {
        const feedback = document.getElementById("feedback");
        if (item.name === currentAnswer.name) {
          feedback.className = "text-success fs-5 mb-4";
          feedback.innerText = "Great job! That is correct.";
          setTimeout(() => {
            buildChoices();
          }, 1500);
        } else {
          feedback.className = "text-danger fs-5 mb-4";
          feedback.innerText = "Try again! Keep looking at the shapes.";
        }
      }

      function nextQuestion() {
        buildChoices();
      }

      buildChoices();
    </script>
  </body>
</html>
