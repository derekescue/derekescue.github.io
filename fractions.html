<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractions Practice</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #f0f7ff, #e9f1ff);
      }
      .app-card {
        max-width: 560px;
        border-radius: 24px;
      }
      #answer {
        font-size: 1.4rem;
        text-align: center;
      }
      .result-ok {
        color: #0f5132;
      }
      .result-bad {
        color: #842029;
      }
      .fraction-display {
        font-size: 2rem;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card shadow-lg app-card mx-auto border-0">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Fractions Practice</h1>
          <p class="mb-3">
            Read the clue and type the fraction in the form
            <strong>n/d</strong>.
          </p>

          <div class="mb-4">
            <div class="card border-0 shadow-sm p-4 bg-white">
              <p class="mb-2 text-muted">Clue</p>
              <p id="clue" class="h4 fw-semibold mb-0"></p>
            </div>
          </div>

          <div class="mb-4">
            <input
              id="answer"
              type="text"
              class="form-control form-control-lg mx-auto"
              style="max-width: 260px"
              placeholder="e.g. 1/2"
              aria-label="Fraction answer"
            />
          </div>

          <div class="d-grid gap-2 mb-3">
            <button class="btn btn-success btn-lg" onclick="checkFraction()">
              Check Answer
            </button>
            <button
              class="btn btn-outline-secondary btn-lg"
              onclick="revealFraction()"
            >
              Reveal Answer
            </button>
            <button
              class="btn btn-outline-primary btn-lg"
              onclick="nextFraction()"
            >
              New Question
            </button>
          </div>

          <p id="result" class="fs-5 mb-3"></p>
          <a class="btn btn-link" href="index.html">Back Home</a>
        </div>
      </div>
    </div>

    <script>
      const fractions = [
        {
          clue: "There are 4 equal pieces and 1 piece is shaded.",
          answer: "1/4",
        },
        {
          clue: "2 out of 3 of the stars are colored in.",
          answer: "2/3",
        },
        {
          clue: "Half of the pizza is eaten.",
          answer: "1/2",
        },
        {
          clue: "3 of 5 balloons are red.",
          answer: "3/5",
        },
        {
          clue: "4 of 8 cookies are gone.",
          answer: "1/2",
        },
        {
          clue: "5 out of 6 markers are blue.",
          answer: "5/6",
        },
        {
          clue: "One quarter of the apples are green.",
          answer: "1/4",
        },
        {
          clue: "3 of 4 pieces of cake are left.",
          answer: "3/4",
        },
        {
          clue: "A ribbon is cut into 2 equal parts and 1 part is blue.",
          answer: "1/2",
        },
      ];

      let currentFraction = null;

      function setFraction() {
        currentFraction =
          fractions[Math.floor(Math.random() * fractions.length)];
        document.getElementById("clue").innerText = currentFraction.clue;
        document.getElementById("answer").value = "";
        document.getElementById("result").innerText = "";
      }

      function parseFraction(value) {
        const match = value.trim().match(/^(\d+)\s*\/\s*(\d+)$/);
        if (!match) return null;
        const n = parseInt(match[1], 10);
        const d = parseInt(match[2], 10);
        if (!Number.isFinite(n) || !Number.isFinite(d) || d === 0) return null;
        return { n, d };
      }

      function reduceFraction({ n, d }) {
        const gcd = (a, b) => (b === 0 ? a : gcd(b, a % b));
        const divisor = gcd(n, d);
        return { n: n / divisor, d: d / divisor };
      }

      function isSameFraction(user, correct) {
        const reducedUser = reduceFraction(user);
        const reducedCorrect = reduceFraction(correct);
        return (
          reducedUser.n === reducedCorrect.n &&
          reducedUser.d === reducedCorrect.d
        );
      }

      function checkFraction() {
        const answerText = document.getElementById("answer").value.trim();
        if (answerText === "") {
          showResult("Type your answer first!", false);
          return;
        }
        const userFraction = parseFraction(answerText);
        if (!userFraction) {
          showResult("Type the fraction like 1/2.", false);
          return;
        }
        const correctFraction = parseFraction(currentFraction.answer);
        if (isSameFraction(userFraction, correctFraction)) {
          showResult("Correct! Nice work!", true);
        } else {
          showResult("Try again!", false);
        }
      }

      function revealFraction() {
        document.getElementById("answer").value = currentFraction.answer;
        showResult(`The answer is ${currentFraction.answer}.`, true);
      }

      function nextFraction() {
        setFraction();
        document.getElementById("answer").focus();
      }

      function showResult(message, good) {
        const result = document.getElementById("result");
        result.innerText = message;
        result.className = good ? "fs-5 result-ok" : "fs-5 result-bad";
      }

      setFraction();
    </script>
  </body>
</html>
