<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shapes</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #e6fcff, #fff1e6);
      }
      .shape-card {
        max-width: 900px;
        border-radius: 24px;
      }
      .shape-box {
        cursor: pointer;
        border-radius: 24px;
        padding: 1rem;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        width: 180px;
      }
      .shape-box:hover,
      .shape-box:focus-visible {
        transform: translateY(-4px);
        box-shadow: 0 14px 28px rgba(0, 0, 0, 0.12);
        outline: none;
      }
      .label {
        margin-top: 12px;
        font-size: 1.4rem;
        font-weight: 600;
      }
      .shape-icon {
        margin: 0 auto;
      }
      .circle {
        width: 130px;
        height: 130px;
        background: #ff7b7b;
        border-radius: 50%;
      }
      .square {
        width: 130px;
        height: 130px;
        background: #4d7cff;
        border-radius: 18px;
      }
      .rectangle {
        width: 170px;
        height: 110px;
        background: #43c16e;
        border-radius: 20px;
      }
      .triangle {
        width: 0;
        height: 0;
        border-left: 75px solid transparent;
        border-right: 75px solid transparent;
        border-bottom: 130px solid #ffb347;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card shape-card shadow-lg border-0 mx-auto">
        <div class="card-body p-4 p-sm-5 text-center">
          <h1 class="fw-bold mb-3">Learn Shapes</h1>
          <p class="mb-4">Tap a shape to hear its name out loud.</p>

          <div class="d-flex flex-wrap justify-content-center gap-4">
            <button
              type="button"
              class="shape-box bg-white shadow-sm text-center border-0"
              onclick="speak('Circle')"
            >
              <div class="shape-icon circle bg-danger"></div>
              <div class="label">Circle</div>
            </button>

            <button
              type="button"
              class="shape-box bg-white shadow-sm text-center border-0"
              onclick="speak('Square')"
            >
              <div class="shape-icon square bg-primary"></div>
              <div class="label">Square</div>
            </button>

            <button
              type="button"
              class="shape-box bg-white shadow-sm text-center border-0"
              onclick="speak('Rectangle')"
            >
              <div class="shape-icon rectangle bg-success"></div>
              <div class="label">Rectangle</div>
            </button>

            <button
              type="button"
              class="shape-box bg-white shadow-sm text-center border-0"
              onclick="speak('Triangle')"
            >
              <div class="shape-icon triangle"></div>
              <div class="label">Triangle</div>
            </button>
          </div>

          <div class="mt-4">
            <a class="btn btn-link" href="index.html">Back Home</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      function speak(text) {
        if ("speechSynthesis" in window) {
          const speech = new SpeechSynthesisUtterance(text);
          speech.rate = 0.9;
          window.speechSynthesis.speak(speech);
        } else {
          alert(text);
        }
      }

      function handleKey(event, text) {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          speak(text);
        }
      }
    </script>
  </body>
</html>
