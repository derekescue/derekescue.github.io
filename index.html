<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids School</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #ffd8d8, #fff5da);
      }
      .hero {
        max-width: 1000px;
        border-radius: 20px;
      }
      .nav-card a,
      .nav-card button {
        min-width: 220px;
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center py-5">
    <div class="container px-3">
      <div class="card hero shadow-lg border-0">
        <div class="card-body p-5">
          <h1 class="display-5 fw-bold mb-4 text-center">Kids School</h1>
          <div class="row g-4">
            <div class="col-12 col-lg-6">
              <div class="card h-100 border-0 shadow-sm">
                <div class="card-body">
                  <h2 class="h4 fw-semibold mb-3">Math</h2>
                  <div class="d-grid gap-3">
                    <a
                      class="btn btn-primary btn-lg nav-card"
                      href="addition.html"
                      >Addition Practice</a
                    >
                    <a
                      class="btn btn-warning btn-lg nav-card"
                      href="subtraction.html"
                      >Subtraction Practice</a
                    >

                    <a
                      class="btn btn-success btn-lg nav-card"
                      href="number-family.html"
                      >Number Family</a
                    >
                    <a
                      class="btn btn-info btn-lg nav-card"
                      href="expanded-number-form.html"
                      >Expanded Number Form</a
                    >
                    <a
                      class="btn btn-primary btn-lg nav-card"
                      href="rounding.html"
                      >Rounding Practice</a
                    >
                    <a
                      class="btn btn-warning btn-lg nav-card"
                      href="shapes.html"
                      >Shapes</a
                    >
                    <a
                      class="btn btn-info btn-lg nav-card text-white"
                      href="money-identifying.html"
                      >Money Identifying</a
                    >
                    <a
                      class="btn btn-secondary btn-lg nav-card"
                      href="money-counting.html"
                      >Money Counting</a
                    >
                    <a
                      class="btn btn-danger btn-lg nav-card"
                      href="multiplication.html"
                      >Multiplication Practice</a
                    >
                  </div>
                </div>
              </div>
            </div>
            <div class="col-12 col-lg-6">
              <div class="card h-100 border-0 shadow-sm">
                <div
                  class="card-body d-flex flex-column justify-content-center align-items-center"
                >
                  <h2 class="h4 fw-semibold mb-3">Spelling</h2>
                  <p class="mb-4 text-center">
                    Practice spelling words with fun clues and a check button.
                  </p>
                  <div class="d-grid gap-3" style="width: 100%; max-width: 260px;">
                    <a
                      class="btn btn-primary btn-lg nav-card"
                      href="spelling.html"
                    >
                      Spelling Practice
                    </a>
                    <a
                      class="btn btn-info btn-lg nav-card"
                      href="bible.html"
                    >
                      Bible Questions
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
